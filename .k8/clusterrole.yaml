apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8-mcp-readonly
rules:
  # Core resources needed by kubectl tools
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - nodes
      - configmaps
      - namespaces
    verbs: ["get", "list"]

  # Istio CRDs needed by kubectl getIstioCrd tool
  - apiGroups: ["networking.istio.io"]
    resources:
      - virtualservices
      - destinationrules
      - serviceentries
      - envoyfilters
    verbs: ["get", "list"]
