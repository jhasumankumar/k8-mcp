apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8-mcp
  namespace: k8-mcp
  labels:
    app: k8-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8-mcp
  template:
    metadata:
      labels:
        app: k8-mcp
    spec:
      serviceAccountName: k8-mcp
      # kubectl and istioctl use the pod's service account token automatically
      # via KUBERNETES_SERVICE_HOST/PORT env vars injected by Kubernetes.
      # No kubeconfig mount is needed when running inside the cluster.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: k8-mcp
          image: k8-mcp:latest  # replace with your registry image, e.g. ghcr.io/your-org/k8-mcp:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
