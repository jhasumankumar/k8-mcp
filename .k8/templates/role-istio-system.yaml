{{- if .Values.istio.tokenCreatorRole.enabled }}
---
# Grants the service account permission to create tokens and port-forward pods in
# istio-system — required by `istioctl proxy-status` when running inside the cluster.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-token-creator
  namespace: istio-system
rules:
  - apiGroups: [""]
    resources: ["serviceaccounts/token", "pods/portforward"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-token-creator
  namespace: istio-system
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}
    namespace: {{ .Values.namespace }}
roleRef:
  kind: Role
  name: {{ .Release.Name }}-token-creator
  apiGroup: rbac.authorization.k8s.io
{{- end }}
