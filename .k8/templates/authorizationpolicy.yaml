apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Values.namespace }}
spec:
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  action: ALLOW
  rules:
    # Allow MCP SSE and message endpoints — MCP clients (Claude, Copilot)
    - to:
        - operation:
            ports: ["8080"]
            paths:
              - /sse
              - /mcp/message

    # Allow REST API and Swagger UI — operators and tooling
    - to:
        - operation:
            ports: ["8080"]
            paths:
              - /api/tools
              - /api/tools/*
              - {{ .Values.springdoc.apiDocsPath }}
              - {{ .Values.springdoc.apiDocsPath }}/*
              - {{ .Values.springdoc.swaggerUiPath }}
              - /swagger-ui/*
              - /webjars/*
