apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Values.namespace }}
spec:
  hosts:
    - {{ .Release.Name }}
  http:
    - match:
        - uri:
            prefix: /sse
        - uri:
            prefix: /mcp/message
        - uri:
            prefix: /api/tools
        - uri:
            prefix: {{ .Values.springdoc.apiDocsPath }}
        - uri:
            prefix: /swagger-ui
      route:
        - destination:
            host: {{ .Release.Name }}
            port:
              number: 8080
      timeout: 0s       # disabled — SSE connections are long-lived
      retries:
        attempts: 0     # no retries for SSE/streaming endpoints
